<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中醫一般科 掛號費查詢</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      background: linear-gradient(135deg, #1a73e8 0%, #6c5ce7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 35px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; color: #333; margin-bottom: 4px; font-size: 1.5rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 22px; font-size: 0.85rem; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #444;
      font-size: 0.88rem;
      font-weight: 500;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.3s;
      background: white;
    }
    .form-group select:focus, .form-group input:focus {
      outline: none;
      border-color: #1a73e8;
    }
    .form-group select:disabled { background: #f5f5f5; color: #999; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a73e8 0%, #6c5ce7 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: bold;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(26,115,232,0.35);
    }
    .btn:active { transform: translateY(0); }
    .preset {
      background: #e8f0fe;
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 18px;
      font-size: 0.8rem;
      color: #1a73e8;
      text-align: center;
    }
    .preset span { margin: 0 4px; }
    .direct-link {
      margin-top: 18px;
      text-align: center;
      font-size: 0.78rem;
      color: #aaa;
    }
    .direct-link a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏥 中醫一般科</h1>
    <h1 style="font-size:1.2rem;color:#1a73e8;margin-bottom:4px;">掛號費查詢</h1>
    <p class="subtitle">健保特約中醫院所查詢</p>

    <div class="preset">
      已自動設定：<span>中醫</span>｜<span>每頁 50 筆</span>
    </div>

    <div class="form-group">
      <label>縣市</label>
      <select id="citySelect">
        <option value="">-- 請選擇縣市 --</option>
        <option value="01">臺北市</option>
        <option value="05">新北市</option>
        <option value="06">桃園市</option>
        <option value="03">臺中市</option>
        <option value="04">臺南市</option>
        <option value="02">高雄市</option>
        <option value="20">基隆市</option>
        <option value="07">新竹市</option>
        <option value="14">嘉義市</option>
        <option value="08">新竹縣</option>
        <option value="09">苗栗縣</option>
        <option value="10">彰化縣</option>
        <option value="11">南投縣</option>
        <option value="12">雲林縣</option>
        <option value="13">嘉義縣</option>
        <option value="15">屏東縣</option>
        <option value="16">宜蘭縣</option>
        <option value="17">花蓮縣</option>
        <option value="18">臺東縣</option>
        <option value="19">澎湖縣</option>
        <option value="21">金門縣</option>
        <option value="22">連江縣</option>
      </select>
    </div>

    <div class="form-group">
      <label>鄉鎮市（選填）</label>
      <select id="townSelect" disabled>
        <option value="">-- 請先選擇縣市 --</option>
      </select>
    </div>

    <div class="form-group">
      <label>診察類別</label>
      <select id="funcTypeSelect">
        <option value="60">中醫</option>
        <option value="01">西醫</option>
        <option value="02">牙醫</option>
      </select>
    </div>

    <div class="form-group">
      <label>醫事機構名稱（選填，模糊搜尋）</label>
      <input type="text" id="hospitalName" placeholder="例如：長庚、仁愛、同喬">
    </div>

    <button class="btn" id="searchBtn">🔍 查詢</button>

    <p class="direct-link">
      <a href="https://info.nhi.gov.tw/INAE1000/INAE1000S01" target="_blank">
        直接前往健保署查詢頁面 →
      </a>
    </p>
  </div>

  <script>
    const citySelect   = document.getElementById('citySelect');
    const townSelect   = document.getElementById('townSelect');
    const funcTypeSelect = document.getElementById('funcTypeSelect');
    const hospitalName = document.getElementById('hospitalName');
    const searchBtn    = document.getElementById('searchBtn');

    // 鄉鎮市二層連動資料
    const TOWN_MAP = {
      '01': ['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],
      '02': ['鹽埕區','鼓山區','左營區','楠梓區','三民區','新興區','前金區','苓雅區','前鎮區','旗津區','小港區','鳳山區','林園區','大寮區','大樹區','大社區','仁武區','鳥松區','橋頭區','燕巢區','田寮區','阿蓮區','路竹區','湖內區','茄萣區','永安區','彌陀區','梓官區','六龜區','甲仙區','杉林區','內門區','茂林區','桃源區','那瑪夏區','岡山區','旗山區','美濃區'],
      '03': ['中區','東區','南區','西區','北區','西屯區','南屯區','北屯區','豐原區','大里區','太平區','清水區','沙鹿區','大甲區','東勢區','梧棲區','烏日區','大肚區','龍井區','霧峰區','潭子區','大雅區','新小區','石岡區','和平區','神岡區','后里區','外埔區','大安區'],
      '04': ['中西區','東區','南區','北區','安南區','安平區','永康區','歸仁區','新化區','左鎮區','玉井區','楠西區','南化區','仁德區','關廟區','龍崎區','官田區','麻豆區','佳里區','西港區','七股區','將軍區','學甲區','北門區','新營區','後壁區','白河區','東山區','六甲區','下營區','柳營區','鹽水區','善化區','大內區','山上區','新市區','安定區'],
      '05': ['板橋區','中和區','永和區','土城區','樹林區','三峽區','蘆洲區','三重區','新莊區','泰山區','林口區','八德區','大溪區','龍潭區','龜山區','鶯歌區','新店區','深坑區','石碇區','坪林區','烏來區','淡水區','三芝區','石門區','金山區','萬里區','汐止區','瑞芳區','貢寮區','平溪區','雙溪區'],
      '06': ['桃園區','中壢區','平鎮區','楊梅區','龍潭區','龜山區','八德區','大溪區','蘆竹區','大園區','觀音區','新屋區','復興區'],
      '07': ['東區','北區'],
      '08': ['竹北市','竹東鎮','新埔鎮','關西鎮','湖口鄉','新豐鄉','峨眉鄉','寶山鄉','北埔鄉','芎林鄉','橫山鄉','尖石鄉','五峰鄉'],
      '09': ['苗栗市','頭份市','竹南鎮','後龍鎮','通霄鎮','苑裡鎮','卓蘭鎮','西湖鄉','苗栗市','頭屋鄉','公館鄉','大湖鄉','泰安鄉','銅鑼鄉','南庄鄉','三義鄉','造橋鄉','三灣鄉','獅潭鄉'],
      '10': ['彰化市','員林市','和美鎮','鹿港鎮','溪湖鎮','二林鎮','田中鎮','北斗鎮','花壇鄉','芬園鄉','大村鄉','埔心鄉','永靖鄉','社頭鄉','二水鄉','田尾鄉','埤頭鄉','溪州鄉','竹塘鄉','大城鄉','芳苑鄉','福興鄉','秀水鄉','埔鹽鄉','線西鄉','伸港鄉'],
      '11': ['南投市','埔里鎮','草屯鎮','竹山鎮','集集鎮','名間鄉','鹿谷鄉','中寮鄉','魚池鄉','國姓鄉','水里鄉','信義鄉','仁愛鄉'],
      '12': ['斗六市','斗南鎮','虎尾鎮','西螺鎮','土庫鎮','北港鎮','古坑鄉','大埤鄉','莿桐鄉','林內鄉','二崙鄉','崙背鄉','麥寮鄉','東勢鄉','褒忠鄉','台西鄉','元長鄉','四湖鄉','口湖鄉','水林鄉'],
      '13': ['太保市','朴子市','布袋鎮','義竹鄉','鹿草鄉','水上鄉','番路鄉','梅山鄉','竹崎鄉','中埔鄉','大埔鄉','吳鳳鄉'],
      '14': ['東區','西區'],
      '15': ['屏東市','潮州鎮','東港鎮','恆春鎮','萬丹鄉','長治鄉','麟洛鄉','九如鄉','里港鄉','鹽埔鄉','高樹鄉','萬巒鄉','內埔鄉','竹田鄉','新埤鄉','枋寮鄉','新園鄉','崁頂鄉','林邊鄉','南州鄉','佳冬鄉','琉球鄉','車城鄉','滿州鄉','枋山鄉','春日鄉','獅子鄉','牡丹鄉','三地門鄉','霧台鄉','瑪家鄉','泰武鄉','來義鄉','春日鄉','獅子鄉'],
      '16': ['宜蘭市','羅東鎮','蘇澳鎮','頭城鎮','礁溪鄉','壯圍鄉','員山鄉','冬山鄉','五結鄉','三星鄉','大同鄉','南澳鄉'],
      '17': ['花蓮市','鳳林鎮','玉里鎮','新城鄉','吉安鄉','壽豐鄉','秀林鄉','豐濱鄉','瑞穗鄉','萬榮鄉','光復鄉','卓溪鄉'],
      '18': ['臺東市','成功鎮','關山鎮','卑南鄉','鹿野鄉','池上鄉','東河鄉','長濱鄉','太麻里鄉','金峰鄉','大武鄉','達仁鄉','綠島鄉','蘭嶼鄉','海端鄉','延平鄉'],
      '19': ['馬公市','湖西鄉','白沙鄉','西嶼鄉','望安鄉','七美鄉'],
      '20': ['中正區','信義區','仁愛區','中山區','安樂區','暖暖區','七堵區'],
      '21': ['金城鎮','金沙鎮','金湖鎮','金寧鄉','烈嶼鄉','烏坵鄉'],
      '22': ['南竿鄉','北竿鄉','莒光鄉','東引鄉'],
    };

    // 連動：選縣市 → 填充鄉鎮市
    citySelect.addEventListener('change', () => {
      const cityCode = citySelect.value;
      townSelect.innerHTML = '';
      if (!cityCode) {
        townSelect.disabled = true;
        townSelect.innerHTML = '<option value="">-- 請先選擇縣市 --</option>';
        return;
      }
      const towns = TOWN_MAP[cityCode] || [];
      townSelect.disabled = false;
      townSelect.innerHTML = '<option value="">全部（不限）</option>';
      towns.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        townSelect.appendChild(opt);
      });
    });

    function doSearch() {
      const cityCode = citySelect.value;
      if (!cityCode) {
        alert('請先選擇縣市');
        return;
      }

      const town     = townSelect.value;
      const funcType = funcTypeSelect.value;
      const name     = hospitalName.value.trim();

      // 建立健保署 URL（型態別固定）
      let url = 'https://info.nhi.gov.tw/INAE1000/INAE1000S01'
        + '?C_AreaCod=' + cityCode
        + '&C_FuncType=' + funcType;

      if (town) url += '&C_Town=' + encodeURIComponent(town);
      if (name) url += '&ws_hosp_name=' + encodeURIComponent(name);
      url += '&PageSize=50';

      window.open(url, '_blank');
    }

    searchBtn.addEventListener('click', doSearch);
    hospitalName.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });

    // URL 參數支援
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('city')) {
      citySelect.value = urlParams.get('city');
      citySelect.dispatchEvent(new Event('change'));
      if (urlParams.has('town')) {
        townSelect.value = urlParams.get('town');
      }
      hospitalName.value = urlParams.get('name') || '';
      setTimeout(doSearch, 600);
    }
  </script>
</body>
</html>
