<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中醫一般科 掛號費查詢</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 1.5rem; }
        .search-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .btn-search { padding: 10px 30px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn-search:hover { background: #1976D2; }
        .btn-search:disabled { background: #ccc; cursor: not-allowed; }
        .status { text-align: center; color: #666; padding: 10px; }
        .results { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .result-item { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .result-item:last-child { border-bottom: none; }
        .result-item:hover { background: #f9f9f9; }
        .hospital-name { font-weight: 500; color: #333; flex: 1; }
        .fee { font-weight: bold; color: #4CAF50; white-space: nowrap; }
        .fee.loading { color: #999; }
        .fee.error { color: #f44336; }
        .pagination { display: flex; justify-content: center; gap: 5px; padding: 15px; flex-wrap: wrap; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
        .page-btn:hover { background: #f0f0f0; }
        .page-btn.active { background: #2196F3; color: white; border-color: #2196F3; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 中醫一般科 掛號費查詢</h1>
        <div class="search-box">
            <div class="form-row">
                <div class="form-group">
                    <label>縣市</label>
                    <select id="citySelect">
                        <option value="">-- 請選擇 --</option>
                        <option value="01">臺北市</option>
                        <option value="02">高雄市</option>
                        <option value="03">臺中市</option>
                        <option value="04">臺南市</option>
                        <option value="05">新北市</option>
                        <option value="06">桃園市</option>
                        <option value="07">新竹市</option>
                        <option value="08">新竹縣</option>
                        <option value="09">苗栗縣</option>
                        <option value="10">彰化縣</option>
                        <option value="11">南投縣</option>
                        <option value="12">雲林縣</option>
                        <option value="13">嘉義縣</option>
                        <option value="14">嘉義市</option>
                        <option value="15">屏東縣</option>
                        <option value="16">宜蘭縣</option>
                        <option value="17">花蓮縣</option>
                        <option value="18">臺東縣</option>
                        <option value="19">澎湖縣</option>
                        <option value="20">基隆市</option>
                        <option value="21">金門縣</option>
                        <option value="22">連江縣</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>醫事機構名稱（選填）</label>
                    <input type="text" id="hospitalName" placeholder="輸入關鍵字模糊搜尋...">
                </div>
                <button class="btn-search" id="searchBtn">查詢</button>
            </div>
        </div>
        <div class="status" id="status"></div>
        <div class="results" id="results" style="display:none;">
            <div id="resultsList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <script>
        const API_BASE = 'https://info.nhi.gov.tw';
        const FUNC_TYPE_TCM = '60';
        let currentPage = 1;
        let currentCity = '';
        let currentHospitalName = '';

        async function fetchHospitals(cityCode, hospName, page = 1) {
            const body = {
                C_FuncType: FUNC_TYPE_TCM,
                C_HospID: '',
                C_HospName: hospName || '',
                C_AreaCod: cityCode,
                C_AreaName: '',
                C_Type: '',
                C_BranchCode: '',
                C_HospAddr: '',
                C_HospCntType: '',
                C_NoneObs: '',
                C_Pre: '',
                C_SrvList: '',
                C_HospAlliance: '',
                C_HospFlu: '',
                C_Plans: '',
                C_SrvDay: 'selAll',
                C_SrvTime: '012',
                C_LongHoliday: '',
                C_LongHolidayTime: '',
                C_ShowType: '2',
                C_Str: '',
                pageDataCount: 50,
                nowPage: page
            };
            const res = await fetch(`${API_BASE}/api/inae1000/inae1000s01/SQL100`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return await res.json();
        }

        async function fetchFee(hospId) {
            const body = { C_HospID: hospId, C_planType: '' };
            const res = await fetch(`${API_BASE}/api/inae1000/inae1000s00/SQL300_1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            return data[0]?.fee?.regisT_FEE_NAME || '無資料';
        }

        function showStatus(msg) { document.getElementById('status').textContent = msg; }

        function renderResults(hospitals) {
            const list = document.getElementById('resultsList');
            list.innerHTML = hospitals.map(h => `
                <div class="result-item" data-id="${h.hosP_ID}">
                    <span class="hospital-name">${h.hosP_NAME}</span>
                    <span class="fee loading">載入中...</span>
                </div>
            `).join('');
            document.getElementById('results').style.display = 'block';
            hospitals.forEach(async h => {
                const item = document.querySelector(`.result-item[data-id="${h.hosP_ID}"] .fee`);
                try {
                    const fee = await fetchFee(h.hosP_ID);
                    item.textContent = fee;
                    item.classList.remove('loading');
                } catch (e) {
                    item.textContent = '查詢失敗';
                    item.classList.add('error');
                }
            });
        }

        function renderPagination(total, pageSize = 50) {
            const pages = Math.ceil(total / pageSize);
            const pag = document.getElementById('pagination');
            if (pages <= 1) { pag.innerHTML = ''; return; }
            let html = '';
            html += `<button class="page-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>第一頁</button>`;
            html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>上一頁</button>`;
            const start = Math.max(1, currentPage - 2);
            const end = Math.min(pages, currentPage + 2);
            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>下一頁</button>`;
            html += `<button class="page-btn" onclick="goPage(${pages})" ${currentPage===pages?'disabled':''}>最終頁</button>`;
            pag.innerHTML = html;
        }

        window.goPage = async function(p) {
            currentPage = p;
            await doSearch();
        };

        async function doSearch() {
            const city = document.getElementById('citySelect').value;
            const name = document.getElementById('hospitalName').value.trim();
            if (!city) { alert('請選擇縣市'); return; }
            currentCity = city;
            currentHospitalName = name;
            document.getElementById('searchBtn').disabled = true;
            showStatus('查詢中...');
            try {
                const data = await fetchHospitals(city, name, currentPage);
                if (data.data && data.data.length > 0) {
                    renderResults(data.data);
                    renderPagination(data.counts);
                    showStatus(`共 ${data.counts} 筆資料`);
                } else {
                    showStatus('查無資料');
                    document.getElementById('results').style.display = 'none';
                }
            } catch (e) {
                showStatus('查詢失敗：' + e.message);
            }
            document.getElementById('searchBtn').disabled = false;
        }

        document.getElementById('searchBtn').addEventListener('click', () => { currentPage = 1; doSearch(); });
        document.getElementById('hospitalName').addEventListener('keypress', e => { if (e.key === 'Enter') { currentPage = 1; doSearch(); } });
    </script>
</body>
</html>
