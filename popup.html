<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      background: #f8f9fa;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8, #6c5ce7);
      color: white;
      padding: 12px 15px;
      border-radius: 8px 8px 0 0;
    }
    .header h3 { font-size: 0.95rem; margin-bottom: 2px; }
    .header p  { font-size: 0.7rem; opacity: 0.9; }
    .content { padding: 12px; }
    .form-group { margin-bottom: 9px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      color: #444;
      margin-bottom: 4px;
      font-weight: 500;
    }
    select, input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.88rem;
      font-family: inherit;
    }
    select:focus, input:focus { outline: none; border-color: #1a73e8; }
    select:disabled { background: #f0f0f0; color: #999; }
    .preset {
      background: #e8f0fe;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: #1a73e8;
      margin-bottom: 10px;
      text-align: center;
    }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #1a73e8, #6c5ce7);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 8px;
      padding: 7px;
      border-radius: 6px;
      font-size: 0.75rem;
      text-align: center;
      display: none;
    }
    .status.info    { background: #e3f2fd; color: #1976D2; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error   { background: #ffebee; color: #c62828; }
    .status.loading { background: #fff8e1; color: #f57f17; }
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #ccc;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note {
      font-size: 0.68rem;
      color: #aaa;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>🏥 中醫掛號費查詢</h3>
    <p>健保特約中醫院所 · 每頁 50 筆</p>
  </div>
  <div class="content">
    <div class="preset">已自動設定：中醫 · 每頁 50 筆</div>

    <div class="form-group">
      <label>縣市</label>
      <select id="citySelect">
        <option value="">-- 請選擇縣市 --</option>
        <option value="01">臺北市</option>
        <option value="05">新北市</option>
        <option value="06">桃園市</option>
        <option value="03">臺中市</option>
        <option value="04">臺南市</option>
        <option value="02">高雄市</option>
        <option value="20">基隆市</option>
        <option value="07">新竹市</option>
        <option value="14">嘉義市</option>
        <option value="08">新竹縣</option>
        <option value="09">苗栗縣</option>
        <option value="10">彰化縣</option>
        <option value="11">南投縣</option>
        <option value="12">雲林縣</option>
        <option value="13">嘉義縣</option>
        <option value="15">屏東縣</option>
        <option value="16">宜蘭縣</option>
        <option value="17">花蓮縣</option>
        <option value="18">臺東縣</option>
        <option value="19">澎湖縣</option>
        <option value="21">金門縣</option>
        <option value="22">連江縣</option>
      </select>
    </div>

    <div class="form-group">
      <label>鄉鎮市（選填）</label>
      <select id="townSelect" disabled>
        <option value="">-- 請先選擇縣市 --</option>
      </select>
    </div>

    <div class="form-group">
      <label>診察類別</label>
      <select id="funcTypeSelect">
        <option value="60">中醫</option>
        <option value="01">西醫</option>
        <option value="02">牙醫</option>
      </select>
    </div>

    <div class="form-group">
      <label>醫事機構名稱（選填）</label>
      <input type="text" id="hospitalName" placeholder="例如：長庚、仁愛、同喬">
    </div>

    <button class="btn-primary" id="searchBtn">🔍 查詢</button>
    <div class="status" id="status"></div>
    <p class="note">查詢結果將在新分頁顯示</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
