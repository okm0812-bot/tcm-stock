        .btn-clear { background: #dc3545; }

        textarea:focus { border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px; font-size: 16px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        .result-item { background: white; border-radius: 10px; padding: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .name { font-weight: bold; font-size: 15px; flex: 1; min-width: 120px; }
        .original { font-size: 12px; color: #666; width: 100%; }
        .badge { font-size: 12px; padding: 4px 10px; border-radius: 15px; white-space: nowrap; }
        .in-stock { background: #d4edda; color: #155724; }
        .out-stock { background: #f8d7da; color: #721c24; }
        .booking { background: #fff3cd; color: #856404; }
        .not-found { background: #e2e3e5; color: #383d41; }
        .corrected { background: #fff3cd; color: #856404; }
        .category { margin-top: 12px; }
        .category h3 { background: rgba(255,255,255,0.3); color: white; padding: 8px 15px; border-radius: 10px; margin: 0 0 8px 0; font-size: 14px; }

        .summary .total { font-size: 26px; font-weight: bold; color: #28a745; }
        .summary .count { color: #666; font-size: 13px; margin-top: 4px; }
        .copy-box { background: white; border-radius: 15px; padding: 15px; margin-top: 12px; }
        .copy-box h4 { margin: 0 0 10px 0; font-size: 14px; color: #333; }
        .copy-content { background: #f5f5f5; border-radius: 10px; padding: 12px; font-size: 14px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .copy-btn { background: #28a745; color: white; border: none; padding: 8px 15px; font-size: 13px; border-radius: 20px; cursor: pointer; margin-top: 10px; }

<body>
<div class="container">
    <div class="header">
        <h1>科學中藥庫存查詢</h1>
        <div class="status" id="status">載入中...</div>
    </div>

    <div class="search-box">
        <div class="btn-group">
            <button class="btn-small" id="refreshBtn" onclick="loadData()">更新資料</button>
            <button class="btn-small btn-clear" onclick="clearInput()">清除</button>
            <button class="btn-small" id="priceBtn" onclick="togglePrice()">顯示價格</button>
        </div>
        <div class="btn-group">
            <button class="btn-small" id="voiceBtn" onclick="startVoiceInput()">語音輸入</button>
            <button class="btn-small" onclick="document.getElementById('imageInput').click()">圖片辨識</button>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImage(event)">
        </div>
        <textarea id="input" placeholder="每行輸入一個產品&#10;支援錯別字自動更正&#10;支援數量（例如：生脈飲2）&#10;語音/圖片自動比對資料庫"></textarea>
        <button class="btn" id="searchBtn" onclick="search()">查詢庫存</button>
    </div>

    <div id="result"></div>

    <div class="tip">
        <li>有貨 = 可出貨</li>
        <li>缺貨 = 無庫存</li>
        <li>點「顯示價格」查看價格</li>
        <li>數量輸入：生脈飲2 = 2罐</li>
        <li>語音/圖片：自動比對資料庫（繁簡體）</li>
    </div>
</div>

// ===== 工具函数 =====
// 判断是否为锭劑（包含"锭"或同音字）
const isTablet = name => {
    // 錠的所有同音字/异体字
    const tabletChars = ['錠', '锭', '罐', '堅', '定', '訂', '碇', '腚', '䦺'];
    return tabletChars.some(c => name.includes(c));
};

// 判断是否为单方（不是复方制剂）
// 复方特征：湯、散、丸、飲、煎、膏 + 明確的複方關鍵字
// 注意：锭劑单独分类
const isSingleHerb = name => {
    if (isTablet(name)) return false;  // 锭劑单独分类
    if (name.includes('複方')) return false;
    if (['湯','散','丸','飲','煎','膏'].some(c => name.includes(c))) return false;
    return true;
};

const parseCSVLine = line => {
    const result = [];
    let current = '', inQuotes = false;
    for (const c of line) {
        if (c === '"') inQuotes = !inQuotes;
        else if (c === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else current += c;
    }
    result.push(current.trim());
    return result;
};

const parseCSV = csvText => {
    const data = {};
    const skipWords = ['劃', '品名', '單方', '目前', '每日', '實際', '以上'];

    csvText.split('\n').slice(1).forEach(line => {
        const row = parseCSVLine(line);
        for (let j = 0; j < row.length; j += 4) {
            const [name, status, price] = [row[j], row[j+1], row[j+2]];
            if (name && !skipWords.some(w => name.includes(w))) {
                // 状态转换：低=有货，無=缺货，預=預訂
                let stockStatus;
                if (status === '低') {
                    stockStatus = '有货';
                } else if (status === '無') {
                    stockStatus = '缺货';
                } else if (status && (status.includes('預') || status.includes('订') || status.includes('定'))) {
                    stockStatus = '預訂';
                } else {
                    stockStatus = status === '無' ? '缺货' : '有货';
                }
                data[name] = [stockStatus, price?.replace(/,/g, '') || '時價'];
            }
        }
    });
    return data;
};

// ===== 科中专用匹配函数 =====
const findBestMatchInKZ = query => {
    if (!query || !Object.keys(DB_KZ).length) return null;

    // 1. 精确匹配
    if (DB_KZ[query]) return { name: query, status: DB_KZ[query][0], price: DB_KZ[query][1], corrected: false };

    // 2. 错别字匹配
    for (const [correct, typos] of Object.entries(TYPO_MAP)) {
        if (query === correct || (Array.isArray(typos) && typos.includes(query))) {
            if (DB_KZ[correct]) return { name: correct, status: DB_KZ[correct][0], price: DB_KZ[correct][1], corrected: true, original: query };
        }
    }

    // 3. 复方优先匹配（按名称长度降序，优先匹配最长的）
    const allNames = Object.keys(DB_KZ).sort((a, b) => b.length - a.length);

    for (const name of allNames) {
        if (!isSingleHerb(name)) {
            if (name === query || name.includes(query)) {
                return { name, status: DB_KZ[name][0], price: DB_KZ[name][1], corrected: name !== query, original: query };
            }
        }
    }

    // 4. 单方匹配
    for (const name of allNames) {
        if (isSingleHerb(name)) {
            if (name === query || name.includes(query)) {
                return { name, status: DB_KZ[name][0], price: DB_KZ[name][1], corrected: name !== query, original: query };
            }
        }
    }

    // 5. 模糊匹配（仅3字以上）
    if (query.length >= 3) {
        let best = null, bestScore = 0.5;
        for (const [name, data] of Object.entries(DB_KZ)) {
            const chars = [...query].filter(c => name.includes(c));
            const score = chars.length / query.length;
            if (score > bestScore) {
                bestScore = score;
                best = { name, status: data[0], price: data[1], corrected: true, original: query };
            }
        }
        if (best) return best;
    }

    return null;
};

// ===== 锭劑专用匹配函数 =====
// 规则：与科中相同的匹配规则，但只在锭劑库中匹配
const findBestMatchInTablet = query => {
    if (!query || !Object.keys(DB_TABLET).length) return null;

    // 1. 精确匹配
    if (DB_TABLET[query]) return { name: query, status: DB_TABLET[query][0], price: DB_TABLET[query][1] };

    // 2. 错别字匹配（锭劑专用）
    for (const [correct, typos] of Object.entries(TYPO_MAP)) {
        if (query === correct || (Array.isArray(typos) && typos.includes(query))) {
            if (DB_TABLET[correct]) return { name: correct, status: DB_TABLET[correct][0], price: DB_TABLET[correct][1] };
        }
    }

    // 3. 移除"錠"后精确匹配
    const queryWithoutDing = query.replace(/錠$/, '').trim();
    const tabletName = queryWithoutDing + '錠';
    if (DB_TABLET[tabletName]) return { name: tabletName, status: DB_TABLET[tabletName][0], price: DB_TABLET[tabletName][1] };

    // 4. 包含匹配（锭劑库中按长度降序）
    const allTabletNames = Object.keys(DB_TABLET).sort((a, b) => b.length - a.length);
    for (const name of allTabletNames) {
        if (name === query || name.includes(query)) {
            return { name, status: DB_TABLET[name][0], price: DB_TABLET[name][1] };
        }
    }

    // 5. 模糊匹配（仅3字以上，门槛50%）
    if (query.length >= 3) {
        let best = null, bestScore = 0.5;
        for (const [name, data] of Object.entries(DB_TABLET)) {
            const matchedChars = [...query].filter(c => name.includes(c));
            const score = matchedChars.length / query.length;
            if (score > bestScore) {
                bestScore = score;
                best = { name, status: data[0], price: data[1] };
            }
        }
        if (best) return best;
    }

    return null;
};

// ===== 核心功能 =====
async function loadData() {
    const btn = document.getElementById('refreshBtn');
    const status = document.getElementById('status');
    const searchBtn = document.getElementById('searchBtn');

    btn.disabled = true;
    btn.textContent = '載入中...';
    searchBtn.disabled = true;

    try {
        // 同时加载两个 Sheet
        const [res1, res2] = await Promise.all([
            fetch(SHEET_URL_KEZHONG),
            fetch(SHEET_URL_TABLET)
        ]);

        if (!res1.ok || !res2.ok) throw new Error('網路錯誤');

        // 解析两个 Sheet
        DB_KZ = parseCSV(await res1.text());
        DB_TABLET = parseCSV(await res2.text());

        const kzCount = Object.keys(DB_KZ).length;
        const tabletCount = Object.keys(DB_TABLET).length;
        status.textContent = `✅ 資料已更新: ${new Date().toLocaleTimeString()} (${kzCount + tabletCount}項)`;
        searchBtn.disabled = false;
        console.log('資料載入成功:', kzCount, '項科中 +', tabletCount, '項錠劑');

    } catch (e) {
        console.error('載入失敗:', e);
        status.textContent = '❌ 載入失敗，請重新整理';
        document.getElementById('result').innerHTML = '<div class="error">無法連線 Google Sheet<br>請檢查網路後點「更新資料」</div>';
    }

    btn.textContent = '更新資料';
    btn.disabled = false;
}

function search() {
    // 关闭麦克风（如果在录音中）
    if (isListening && recognition) {
        recognition.stop();
        recognition = null;
        isListening = false;
        const voiceBtn = document.getElementById('voiceBtn');
        voiceBtn.textContent = '🎤 語音輸入';
        voiceBtn.style.background = '#667eea';
    }

    // 检查数据
    if (!Object.keys(DB_KZ).length || !Object.keys(DB_TABLET).length) {
        document.getElementById('result').innerHTML = '<div class="error">請先點「更新資料」載入庫存資料</div>';
        return;
    }

    const inputEl = document.getElementById('input');
    const lines = inputEl.value.trim().split('\n').map(l => l.trim()).filter(Boolean);

    if (!lines.length) {
        inputEl.focus();
        return;
    }

    const skipKeywords = ['100g', '200g', '錠劑', '錠'];
    let results = [];  // 保存结果，保持顺序
    let copyText = '';
    let stats = { inStock: 0, outStock: 0, booking: 0, total: 0 };
    let firstLine = true;

    for (const line of lines) {
        // 跳过规格行
        if (skipKeywords.includes(line.toLowerCase())) {
            copyText += line + '\n';
            continue;
        }

        // 跳过客户名
        if (firstLine) {
            firstLine = false;
            const isCustomerName = !line.match(/\d/) && line.length <= 4 &&
                !['湯','散','丸','飲','煎','丹','膏','錠'].some(c => line.includes(c));
            if (isCustomerName) {
                copyText += line + '\n';
                continue;
            }
        }

        // 检查是否为规格关键词（100G, 200G, 單方, 複方, 錠劑）
        const specKeywords = ['100G', '200G', '單方', '複方', '錠劑'];
        const isSpecification = specKeywords.some(keyword => line.includes(keyword));
        
        if (isSpecification) {
            // 规格关键词直接输出，不进行产品匹配
            copyText += line + '\n';
            results.push({ displayName: line, outputName: line, qty: 1, status: 'specification', source: 'spec' });
            continue;
        }

        // 解析产品名和数量
        // 移除常见的单位词（瓶、罐、包、盒等）
        let cleanLine = line.replace(/[瓶罐包盒顆粒]/g, '');

        // 提取数字（末尾1-2位）作为数量
        const numMatch = cleanLine.match(/(\d{1,2})$/);
        const qty = numMatch ? parseInt(numMatch[1]) : 1;

        // 移除数字得到产品名（保留原始输入的产品名格式）
        const originalProductName = cleanLine.replace(/\d+$/, '').trim();
        const query = originalProductName;

        if (!query) continue;

        // 判断是锭劑还是科中
        const isTabletInput = query.includes('錠') || query.includes('锭');

        let result = null;

        if (isTabletInput) {
            // 锭劑：3个字以上进行模糊匹配锭劑库
            const tabletResult = findBestMatchInTablet(query);
            if (tabletResult) {
                result = { displayName: tabletResult.name, status: tabletResult.status, price: tabletResult.price, source: 'tablet' };
            }
        } else {
            // 科中：使用完整匹配逻辑
            const kzResult = findBestMatchInKZ(query);
            if (kzResult) {
                result = { displayName: kzResult.name, status: kzResult.status, price: kzResult.price, source: 'kz', corrected: kzResult.corrected };
            }
        }

        if (result) {
            const { displayName, status, price, source } = result;
            const unitPrice = price === '時價' ? 0 : parseInt(price) || 0;
            const totalPrice = unitPrice * qty;
            const isInStock = status === '有货';
            const isBooking = status === '預訂';

            // 更新统计
            if (isBooking) {
                stats.booking += qty;
            } else if (isInStock) {
                stats.inStock += qty;
                stats.total += totalPrice;
            } else {
                stats.outStock += qty;
            }

            // 输出时组合：产品名 + 数量（如果用户输入了数量就显示）
            const hasUserQty = numMatch !== null;  // 用户是否输入了数量
            const outputName = hasUserQty ? displayName + qty : displayName;

            // 复制文本 - 新格式：产品名数量（状态）
            const statusSymbol = isBooking ? '（預）' : isInStock ? '（有）' : '（缺）';
            copyText += outputName + statusSymbol + '\n';

            // 保存结果
            results.push({ displayName, outputName, qty, status, price, isBooking, isInStock, unitPrice, totalPrice, source });
        } else {
            copyText += line + '\t找不到\n';
            results.push({ displayName: line, outputName: line, qty: 1, status: 'not_found', source: 'none' });
        }
    }

    // 构建HTML（保持输入顺序）
    let html = '';

    for (const item of results) {
        if (item.status === 'not_found') {
            html += `<div class="result-item">
                <div class="name">${item.outputName}</div>
                <div class="badge not-found">找不到</div>
            </div>`;
        } else if (item.status === 'specification') {
            // 规格关键词：直接显示，不加状态
            html += `<div class="result-item">
                <div class="name">${item.outputName}</div>
                <div class="badge spec">規格</div>
            </div>`;
        } else {
            const priceStr = showPrice ? (item.price === '時價' ? '請電洽' : (item.qty > 1 ? `${item.unitPrice}x${item.qty}=${item.totalPrice}元` : `${item.price}元`)) : '';
            const statusClass = item.isBooking ? 'booking' : item.isInStock ? 'in-stock' : 'out-stock';
            const statusText = item.isBooking ? '（預）' : item.isInStock ? '（有）' : '（缺）';
            html += `<div class="result-item">
                <div class="name">${item.outputName}${statusText}</div>
                <div class="badge ${statusClass}">${statusText}</div>
                <div class="price">${priceStr}</div>
            </div>`;
        }
    }

    // 汇总统计
    html += `<div class="summary">
        <div class="total">${showPrice && stats.total > 0 ? stats.total + ' 元' : '-'}</div>
        <div class="count">有貨 ${stats.inStock} 罐 | 缺貨 ${stats.outStock} 罐 | 預訂 ${stats.booking} 罐</div>
    </div>`;

    // 复制框
    html += `<div class="copy-box">
        <h4>📋 查詢結果（可複製）</h4>
        <div class="copy-content" id="copyContent">${copyText}</div>
        <button class="copy-btn" id="copyBtn">複製結果</button>
    </div>`;

    // 更新DOM
    document.getElementById('result').innerHTML = html;

    // 绑定复制按钮
    document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(copyText).then(() => {
            this.textContent = '✅ 已複製！';
            this.classList.add('copied');
            setTimeout(() => {
                this.textContent = '複製結果';
                this.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            console.error('複製失敗:', err);
            alert('複製失敗，請手動複製');
        });
    });
}

// ===== 语音输入 =====
let recognition = null;
let isListening = false;

function startVoiceInput() {
    const btn = document.getElementById('voiceBtn');

    // 检查浏览器支持
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('您的瀏覽器不支援語音輸入，請使用 Chrome 或 Safari');
        return;
    }

    // 停止录音
    if (isListening && recognition) {
        recognition.stop();
        recognition = null;
        isListening = false;
        btn.textContent = '🎤 語音輸入';
        btn.style.background = '#667eea';
        return;
    }

    // 开始录音
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW';
    recognition.continuous = true;
    recognition.interimResults = true;  // 开启实时结果，加快响应
    recognition.maxAlternatives = 1;    // 只返回最佳结果，减少计算

    recognition.onresult = event => {
        const textarea = document.getElementById('input');

        for (let i = event.resultIndex; i < event.results.length; i++) {
            const text = event.results[i][0].transcript.trim();

            // 只处理最终结果（isFinal=true），忽略实时识别中的临时结果
            if (!event.results[i].isFinal) continue;

            console.log('语音最终结果:', text);

            if (text.length < 2) continue;

            // 清理文本
            const cleanedText = text.replace(/[，。、！？\s]/g, '');

            // 智能匹配数据库产品
            const match = smartMatchProduct(cleanedText);

            if (match) {
                const currentText = textarea.value.trim();
                textarea.value = currentText + (currentText ? '\n' : '') + match;
                console.log('已添加产品:', match);
            }
            // 如果没匹配到，不添加（避免无效输入）
        }
    };

    recognition.onerror = event => {
        console.error('语音识别错误:', event.error);
        if (event.error === 'not-allowed') {
            alert('請允許麥克風權限');
        }
    };

    recognition.onend = () => {
        if (isListening) {
            try {
                recognition.start();
            } catch (e) {
                isListening = false;
                btn.textContent = '🎤 語音輸入';
                btn.style.background = '#667eea';
            }
        }
    };

    recognition.start();
    isListening = true;
    btn.textContent = '🔴 停止聆聽';
    btn.style.background = '#dc3545';
}

// 智能匹配产品（用于语音和图片输入）
function smartMatchProduct(text) {
    if (!text || text.length < 2) return null;
    
    console.log('[智能匹配] 输入:', text);
    
    // 清理文本
    const cleanedText = text.replace(/[^\u4e00-\u9fa50-9]/g, '');
    if (!cleanedText) return null;
    
    console.log('[智能匹配] 清理后:', cleanedText);
    
    // 提取数量
    const numMatch = cleanedText.match(/(\d+)$/);
    const qty = numMatch ? numMatch[1] : '';
    const productName = numMatch ? cleanedText.slice(0, -numMatch[1].length) : cleanedText;
    
    console.log('[智能匹配] 产品名:', productName, '数量:', qty);
    
    // 0. 检测是否可能是锭劑（包含「錠」的同音字：罐、堅、定、訂、碇、腚、䦺）
    const isLikelyTablet = /[罐堅定訂碇腚䦺].*[煎散丸湯]/.test(productName) || 
                          productName.includes('錠') ||
                          productName.includes('罐') ||
                          productName.includes('堅') ||
                          productName.includes('定') ||
                          productName.includes('訂') ||
                          productName.includes('碇') ||
                          productName.includes('腚');
    
    // 1. 如果可能是锭劑（包含同音字），优先在锭劑库匹配
    if (isLikelyTablet) {
        console.log('[智能匹配] 检测到锭劑关键字，检查锭劑库...');
        console.log('[智能匹配] 锭劑库产品数:', Object.keys(DB_TABLET).length);
        
        const tabletResult = findBestMatchInTablet(productName);
        if (tabletResult) {
            console.log(`[智能匹配] 锭劑匹配成功: "${productName}" → "${tabletResult.name}"`);
            return tabletResult.name + qty;
        }
        console.log('[智能匹配] 锭劑库没找到，返回null（不查科中库）');
        return null;  // 锭劑库没找到就返回null，不到科中库
    }
    
    // 2. 不包含「錠」，在科中库匹配
    // 先尝试精确匹配
    const directMatch = findBestMatchInKZ(productName);
    if (directMatch) {
        console.log(`[智能匹配] 科中精确: "${productName}" → "${directMatch.name}"`);
        return directMatch.name + qty;
    }
    
    // 科中库模糊匹配
    let bestMatch = null;
    let maxScore = 0.5;
    
    for (const name of Object.keys(DB_KZ)) {
        const chars = [...productName];
        const nameChars = [...name];
        
        // 计算精确匹配字符数
        let exactCount = 0;
        for (const c of chars) {
            if (nameChars.includes(c)) exactCount++;
        }
        
        // 计算相似字符匹配数
        let similarCount = 0;
        for (const c of chars) {
            if (!nameChars.includes(c)) {
                const similarChars = getSimilarChars(c);
                for (const sc of similarChars) {
                    if (nameChars.includes(sc)) {
                        similarCount += 0.7;
                        break;
                    }
                }
            }
        }
        
        // 相似度
        const charScore = (exactCount + similarCount) / Math.max(chars.length, nameChars.length);
        
        // 【5字3匹配规则】
        let bonus = 0;
        if (chars.length >= 5 && exactCount >= 3) {
            bonus = 0.15 + (exactCount - 3) * 0.05;
        }
        
        // 发音相似度
        const pronScore = getPronunciationSimilarity(productName, name);
        
        const finalScore = Math.max(charScore, pronScore) + bonus;
        
        if (finalScore > maxScore) {
            maxScore = finalScore;
            bestMatch = name;
        }
    }
    
    if (bestMatch) {
        console.log(`[智能匹配] 科中模糊: "${productName}" → "${bestMatch}" (${(maxScore * 100).toFixed(0)}%)`);
        return bestMatch + qty;
    }
    
    return null;
}

            const nSimilar = similarChars[n] || [];

            if (tSimilar.includes(n) || nSimilar.includes(t)) {
                matchScore += 0.7;  // 相似字符给 0.7 分
            }
        }
    }

    return totalChars > 0 ? matchScore / maxLen : 0;
}

// ===== 图片辨识（OCR.space API + 备用 Tesseract）=====
const OCR_SPACE_API_KEY = 'helloworld'; // 免费 API Key，每天 500 次

// OCR.space 图片辨识
async function ocrSpaceOCR(file) {
    console.log('[OCR.space] 开始辨识图片...');

    const formData = new FormData();
    formData.append('language', 'cht'); // 繁体中文
    formData.append('isOverlayRequired', 'false');
    formData.append('detectOrientation', 'true');
    formData.append('scale', 'true');
    formData.append('OCREngine', '2'); // Engine 2 准确度更高

    // 如果文件大于 1MB，先压缩
    if (file.size > 1024 * 1024) {
        console.log('[OCR.space] 图片太大，需要压缩...');
        file = await compressImage(file, 1024);
    }
    formData.append('file', file);

    try {
        const res = await fetch(`https://api.ocr.space/parse/image`, {
            method: 'POST',
            headers: { 'apikey': OCR_SPACE_API_KEY },
            body: formData
        });

        const data = await res.json();

        if (data.ParsedResults && data.ParsedResults.length > 0) {
            const text = data.ParsedResults.map(r => r.ParsedText).join('\n');
            console.log('[OCR.space] 辨识成功');
            return text;
        } else {
            console.error('[OCR.space] 辨识结果为空:', data);
            return null;
        }
    } catch (e) {
        console.error('[OCR.space] 网络错误:', e.message);
        return null;
    }
}

// 图片压缩函数
async function compressImage(file, maxWidth) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(blob => {
                resolve(new File([blob], file.name, { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.8);
        };
        img.src = URL.createObjectURL(file);
    });
}

// 备用 Tesseract.js 辨识
async function tesseractOCR(file) {
    console.log('[备用OCR] 正在加载 Tesseract.js...');

    if (!window.Tesseract) {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
        document.head.appendChild(script);
        await new Promise(r => script.onload = r);
    }

    const result = await Tesseract.recognize(file, 'chi_tra', {
        logger: m => console.log('[备用OCR] 进度:', Math.round((m.progress || 0) * 100) + '%')
    });

    return result.data.text;
}

// ===== 图片辨识 =====
async function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;

    const btn = document.querySelector('[onclick*="imageInput"]');
    const originalText = btn.textContent;
    btn.textContent = '辨識中...';
    btn.disabled = true;

    try {
        // 先尝试 OCR.space
        let text = await ocrSpaceOCR(file);

        // 如果失败，使用备用 Tesseract.js
        if (!text) {
            console.log('[图片辨识] OCR.space 失败，尝试备用方案...');
            text = await tesseractOCR(file);
        }

        if (!text) {
            alert('圖片辨識失敗，請確認網路連線或稍後再試');
            btn.textContent = originalText;
            btn.disabled = false;
            return;
        }

        console.log('[图片辨识] 原始结果:', text);

        // 提取所有行
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length >= 1);
        console.log(`[图片辨识] 共 ${lines.length} 行原始数据:`);
        lines.forEach((line, i) => console.log(`  行${i+1}: "${line}"`));

        // 预处理：分离产品名和数量，然后一对一配对
        const productLines = [];
        const numberLines = [];

        // 第一步：分离产品名行和数量行
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const cleaned = line.replace(/[^\u4e00-\u9fa50-9]/g, '');

            // 如果是纯数字（1-99），记录到数量列表
            if (/^\d{1,2}$/.test(cleaned)) {
                const num = parseInt(cleaned);
                if (num >= 1 && num <= 99) {
                    numberLines.push(num);
                    console.log(`[图片辨识] 数量: ${num}`);
                }
            } else {
                // 非数字行视为产品名
                productLines.push(cleaned);
                console.log(`[图片辨识] 产品: "${cleaned}"`);
            }
        }

        // 第二步：一对一配对（产品 + 对应位置的数量）
        const processedLines = [];
        const minLen = Math.min(productLines.length, numberLines.length);
        for (let i = 0; i < productLines.length; i++) {
            if (i < minLen) {
                processedLines.push(productLines[i] + numberLines[i]);
                console.log(`[图片辨识] 配对: "${productLines[i]}" + ${numberLines[i]} = "${processedLines[processedLines.length - 1]}"`);
            } else if (i === productLines.length - 1 && numberLines.length === productLines.length - 1) {
                // 如果数量比产品少1个，把最后一个数量给最后一个产品
                processedLines.push(productLines[i] + numberLines[numberLines.length - 1]);
                console.log(`[图片辨识] 补足: "${productLines[i]}" + ${numberLines[numberLines.length - 1]} = "${processedLines[processedLines.length - 1]}"`);
            } else {
                processedLines.push(productLines[i]);
            }
        }

        console.log(`[图片辨识] 处理后共 ${processedLines.length} 行:`);
        processedLines.forEach((line, i) => console.log(`  处理${i+1}: "${line}"`));

        // 分类存储
        const matchedTablet = [];
        const matched100g = [];
        const matched200g = [];
        const unmatchedLines = [];

        for (const cleaned of processedLines) {
            if (cleaned.length < 2) continue;

            // 移除开头的数字（如序号 1. 2. 等）
            let productName = cleaned.replace(/^\d+/, '');
            if (productName.length < 2) continue;

            // 移除末尾的大数字（价格）
            productName = productName.replace(/\d{3,}$/, '');
            if (productName.length < 2) continue;

            // 提取产品名和数量（末尾1-2位数字）
            const numMatch = productName.match(/^(.+?)(\d{1,2})$/);
            let qty = '';

            if (numMatch) {
                productName = numMatch[1];
                qty = numMatch[2];
                // 如果数字大于99，可能是误识别
                if (parseInt(qty) > 99) qty = '';
            }

            if (productName.length < 2) continue;

            // 智能匹配
            const match = smartMatchProduct(productName);

            if (match) {
                // 组合产品名和数量（用于显示）
                const finalMatch = match + qty;

                // 判断是单方、复方还是锭劑
                const matchProductName = match.replace(/\d+$/, '');
                const isSingle = isSingleHerb(matchProductName);
                const isTab = isTablet(matchProductName);

                if (isTab) {
                    if (!matchedTablet.includes(finalMatch)) matchedTablet.push(finalMatch);
                } else if (isSingle) {
                    if (!matched100g.includes(finalMatch)) matched100g.push(finalMatch);
                } else {
                    if (!matched200g.includes(finalMatch)) matched200g.push(finalMatch);
                }

                console.log(`[图片辨识] 匹配: "${productName}" → "${finalMatch}" (${isTab ? '錠劑' : isSingle ? '100g' : '200g'})`);
            } else {
                console.log(`[图片辨识] 未匹配: "${productName}"`);
                unmatchedLines.push(productName);
            }
        }

        console.log('[图片辨识] 结果:', matchedTablet.length, '个錠劑', matched100g.length, '个100g', matched200g.length, '个200g', unmatchedLines.length, '个未匹配');

        // 组装输出结果
        let output = '';

        // 先输出锭劑
        if (matchedTablet.length > 0) {
            output += '錠劑\n' + matchedTablet.join('\n');
        }

        // 再输出单方（100g）
        if (matched100g.length > 0) {
            if (output) output += '\n';
            output += '100g\n' + matched100g.join('\n');
        }

        // 再输出复方（200g）
        if (matched200g.length > 0) {
            if (output) output += '\n';
            output += '200g\n' + matched200g.join('\n');
        }

        // 填入输入框
        const textarea = document.getElementById('input');
        if (output) {
            textarea.value = output;
            console.log('图片辨识完成，匹配到:', matchedTablet.length + matched100g.length + matched200g.length, '项');
        } else {
            alert('無法辨識圖片中的產品，請確認圖片清晰度或手動輸入');
        }

    } catch (err) {
        console.error('图片辨识错误:', err);
        alert('圖片辨識失敗，請嘗試其他圖片');
    }

    btn.textContent = originalText;
    btn.disabled = false;
    e.target.value = '';
}

// ============================================================
// 初始化
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
    // 绑定图片输入事件
    const imageInput = document.getElementById('imageInput');
    const imageBtn = document.getElementById('imageBtn');

    if (imageBtn && imageInput) {
        imageBtn.addEventListener('click', function() {
            imageInput.click();
        });

        imageInput.addEventListener('change', function(event) {
            handleImage(event);
        });
    }

    // 页面加载时自动加载数据
    loadData();
});
</script>
